{% extends "base.html" %}
{% load static i18n %}
{% block title %}Onboarding — CREDA{% endblock %}
{% block body %}
<div class="min-h-screen creda-app" style="background: var(--surface); font-family: 'Inter', system-ui, sans-serif;">
  <header class="border-b border-[var(--border)] bg-[var(--card)]">
    <div class="max-w-[640px] mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'dashboard' %}" class="text-sm font-medium" style="color: var(--primary);">← {% trans "Dashboard" %}</a>
      <span class="text-xs font-bold uppercase tracking-widest" style="color: var(--text-secondary);">CREDA</span>
    </div>
  </header>
  {% block onboarding_content %}{% endblock %}
</div>
{% endblock %}
