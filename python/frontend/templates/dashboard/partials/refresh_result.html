{% if error %}
<div class="glass rounded-xl border border-red-500/30 bg-red-500/5 p-4 mt-2">
  <div class="flex items-center gap-2">
    <svg class="w-5 h-5 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <p class="text-sm text-red-400">NAV refresh failed: {{ error }}</p>
  </div>
</div>
{% elif result %}
<div class="glass rounded-xl border border-emerald-500/30 bg-emerald-500/5 p-4 mt-2">
  <div class="flex items-center gap-2">
    <svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <p class="text-sm font-semibold text-emerald-400">NAVs refreshed successfully!</p>
  </div>
  <p class="text-[10px] uppercase tracking-[0.15em] text-emerald-500 ml-7 mt-1">Reload page to see updated values</p>
</div>
{% endif %}
