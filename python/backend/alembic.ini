# Alembic configuration for CREDA FastAPI backend
# Manages domain tables in creda_api database

[alembic]
script_location = alembic
# Use DATABASE_URL from env.py (settings); this fallback is for alembic info only
sqlalchemy.url = postgresql+asyncpg://creda_admin:creda_secure_2025@localhost:8010/creda_api

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
